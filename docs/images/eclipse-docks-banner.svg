      <line x1="7" y1="43" x2="23" y2="43"/>
      <line x1="7" y1="46" x2="19" y2="46"/>
    </g>
    <path d="M2 50 L28 46 L30 56 L4 60 Z" fill="#334155" stroke="#000" stroke-width="0.75"/>
    <path d="M4 50 L4 72 L10 72 L10 50 Z" fill="#1e293b"/>
    <path d="M10 50 L10 72 L16 72 L16 50 Z" fill="#1e293b"/>
  </g>
  </g>

  <!-- Branding on top of scene -->
  <g transform="translate(260, 72)">
    <rect x="0" y="0" width="22" height="22" rx="5" fill="#0d6efd" stroke="#000" stroke-width="1.2"/>
    <rect x="28" y="0" width="22" height="22" rx="5" fill="#cfe2ff" stroke="#000" stroke-width="1.2"/>
    <rect x="0" y="28" width="22" height="22" rx="5" fill="#cfe2ff" stroke="#000" stroke-width="1.2"/>
