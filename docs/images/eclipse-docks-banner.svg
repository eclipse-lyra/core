  <text x="260" y="188" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="40" font-weight="800" fill="#0d6efd" letter-spacing="-0.02em">Eclipse Docks</text>
  <text x="260" y="248" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#0d6efd" opacity="0.9">IDE-LEVEL EXTENSIBILITY | WEB-NATIVE | OPEN SOURCE</text>
