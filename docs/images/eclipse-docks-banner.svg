<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1584" height="396" viewBox="0 0 1584 396" fill="none" aria-label="Eclipse Docks: isometric cube foundation, tower crane lowering the next module, developers with laptops beside the assembly">
  <defs>
