    <line x1="1064" y1="125" x2="1064" y2="268" stroke="#1e293b" stroke-width="1" opacity="0.5"/>
    <line x1="1078" y1="125" x2="1078" y2="268" stroke="#1e293b" stroke-width="1" opacity="0.5"/>
